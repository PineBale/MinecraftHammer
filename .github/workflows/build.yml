name: Build

on:
  push:
    branches:
      - "master"
    paths:
      - "src/main/java/**/*.java"
      - "src/main/resources/"
      - "src/test/java/**/*.java"
      - "src/test/resources/"
      - "!.gitattributes"
      - "!.gitignore"
      - "!README.md"
      - "!README"
      - "!LICENSE"
      - "!COPYING"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17
          cache: "gradle"

      - run: ./gradlew build

      - uses: mikepenz/action-junit-report@v6.4.0
        if: ${{ success() || failure() }}
        with:
          report_paths: ./build/test-results/test/TEST-*.xml
          include_passed: true
          detailed_summary: true
          fail_on_failure: true
          require_tests: true
          check_name: Test Report
          check_title_template: '{{SUITE_NAME}} | {{TEST_NAME}}'

      - uses: PineBale/jacoco-csv-summary@v1.0.1
        with:
          csv-file: ./build/reports/jacoco/test/jacocoTestReport.csv
          write-summary: true
          write-check: true
          check-name: Coverage
